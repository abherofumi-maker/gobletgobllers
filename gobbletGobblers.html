<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ゴブレットゴブラーズ（Web）</title>
<style>
:root{
--bg1:#fff3c7;
--bg2:#d7f8ff;
--ink:#222;
--card:#ffffffcc;
--shadow: 0 14px 30px rgba(0,0,0,.15);
--blue:#2f86ff;
--blueDeep:#0b4dff;
--orange:#ff8a2f;
--orangeDeep:#ff4d00;
--good:#2ecc71;
--warn:#f39c12;
--bad:#e74c3c;
--cell:#fff;
--grid:#222;
--glow: 0 0 0 4px rgba(46, 204, 113, .35), 0 10px 20px rgba(46, 204, 113, .22);
}

*{ box-sizing:border-box; }
body{
margin:0;
color:var(--ink);
background:
radial-gradient(circle at 20% 10%, var(--bg2) 0 35%, transparent 36%),
radial-gradient(circle at 85% 25%, var(--bg1) 0 40%, transparent 41%),
linear-gradient(135deg, #fff 0%, #f6ffef 40%, #fff4ff 100%);
font-family: "Comic Sans MS","Hiragino Maru Gothic ProN","Meiryo",system-ui,sans-serif;
min-height:100vh;
overflow-x:hidden;
}

header{
padding:18px 16px 10px;
display:flex;
align-items:center;
justify-content:center;
position:sticky;
top:0;
z-index:5;
backdrop-filter: blur(10px);
background: linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,255,255,.45));
border-bottom: 1px solid rgba(0,0,0,.08);
}

.title{
display:flex;
gap:12px;
align-items:center;
}
.logo{
width:42px;height:42px;
border-radius:14px;
background: conic-gradient(from 30deg, var(--blue), var(--orange), #ffd400, #7cff8a, var(--blue));
box-shadow: 0 10px 20px rgba(0,0,0,.15);
position:relative;
transform: rotate(-6deg);
}
.logo:before, .logo:after{
content:"";
position:absolute;
width:10px;height:10px;
background:#111;
border-radius:50%;
top:13px;
box-shadow: inset 0 -2px 0 rgba(255,255,255,.2);
}
.logo:before{ left:12px; }
.logo:after{ right:12px; }
.logo i{
position:absolute;
left:10px; right:10px; bottom:10px;
height:10px;
border-radius:0 0 12px 12px;
background:#111;
transform: rotate(2deg);
}

h1{
margin:0;
font-size:18px;
letter-spacing:.5px;
line-height:1.1;
}
.subtitle{
margin:2px 0 0;
font-size:12px;
opacity:.75;
}

main{
max-width: 1100px;
margin: 0 auto;
padding: 14px 12px 26px;
display:grid;
grid-template-columns: 1fr 380px;
gap:14px;
align-items:start;
}

@media (max-width: 980px){
main{ grid-template-columns: 1fr; }
}

.panel{
background: var(--card);
border: 1px solid rgba(0,0,0,.08);
border-radius: 18px;
box-shadow: var(--shadow);
padding: 14px;
}

.statusRow{
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
justify-content:space-between;
margin-bottom:10px;
}

.badge{
display:inline-flex;
gap:8px;
align-items:center;
padding: 8px 10px;
border-radius: 999px;
font-weight: 700;
background: rgba(255,255,255,.85);
border: 1px solid rgba(0,0,0,.08);
box-shadow: 0 8px 20px rgba(0,0,0,.08);
}
.dot{
width:12px;height:12px;border-radius:50%;
background: #999;
box-shadow: inset 0 -2px 0 rgba(255,255,255,.35);
}
.dot.blue{ background: var(--blue); }
.dot.orange{ background: var(--orange); }

.btnRow{
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:flex-end;
}

button{
border:0;
cursor:pointer;
padding: 10px 12px;
border-radius: 12px;
font-weight: 800;
background:#fff;
color:#111;
border: 1px solid rgba(0,0,0,.12);
box-shadow: 0 10px 22px rgba(0,0,0,.09);
transition: transform .08s ease, box-shadow .18s ease;
user-select:none;
-webkit-tap-highlight-color: transparent;
}
button:hover{ transform: translateY(-1px); }
button:active{ transform: translateY(1px) scale(.99); box-shadow: 0 4px 12px rgba(0,0,0,.12); }
button.secondary{
background: rgba(255,255,255,.7);
font-weight:700;
}

.message{
margin-top:10px;
padding: 10px 12px;
border-radius: 14px;
background: rgba(255,255,255,.7);
border: 1px dashed rgba(0,0,0,.18);
min-height: 46px;
display:flex;
align-items:center;
gap:10px;
font-weight: 700;
}
.message .icon{
width:24px;height:24px;border-radius:9px;
background: #111;
display:grid;
place-items:center;
color:#fff;
font-size:14px;
flex:0 0 auto;
transform: rotate(-6deg);
}
.message.good .icon{ background: var(--good); }
.message.warn .icon{ background: var(--warn); }
.message.bad .icon{ background: var(--bad); }

/* Board */
.boardWrap{
display:grid;
grid-template-columns: 1fr;
gap:12px;
}

.board{
width:min(520px, 100%);
aspect-ratio: 1 / 1;
margin: 0 auto;
padding: 14px;
border-radius: 22px;
background:
radial-gradient(circle at 20% 15%, rgba(255,255,255,.9), rgba(255,255,255,.55)),
linear-gradient(160deg, rgba(255,255,255,.75), rgba(255,255,255,.35));
border: 2px solid rgba(0,0,0,.15);
box-shadow: 0 18px 40px rgba(0,0,0,.15);
position:relative;
}

.grid{
width:100%;
height:100%;
display:grid;
grid-template-columns: repeat(3, 1fr);
grid-template-rows: repeat(3, 1fr);
gap: 12px;
position:relative;
}

.cell{
position:relative;
border-radius: 18px;
background: var(--cell);
border: 2px solid rgba(0,0,0,.22);
box-shadow: 0 10px 24px rgba(0,0,0,.10);
cursor:pointer;
overflow:hidden;
display:grid;
place-items:center;
transition: transform .12s ease, box-shadow .2s ease;
user-select:none;
-webkit-tap-highlight-color: transparent;
}
.cell:hover{ transform: translateY(-2px); }
.cell:active{ transform: translateY(1px); }

.cell.valid{
box-shadow: var(--glow);
border-color: rgba(46, 204, 113, .65);
background: linear-gradient(180deg, rgba(220,255,231,.9), rgba(255,255,255,.95));
}

.cell.from{
border-color: rgba(0,0,0,.45);
background: linear-gradient(180deg, rgba(255,255,180,.9), rgba(255,255,255,.95));
}

.cell.win{
border-color: rgba(255, 215, 0, .95);
box-shadow: 0 0 0 4px rgba(255,215,0,.35), 0 14px 30px rgba(255,215,0,.22);
background: linear-gradient(180deg, rgba(255,250,205,.95), rgba(255,255,255,.95));
}

/* Hidden stack indicator */
.stackDots{
position:absolute;
right:10px;
bottom:10px;
display:flex;
gap:4px;
opacity:.8;
pointer-events:none;
}
.stackDots span{
width:6px;height:6px;border-radius:50%;
background: rgba(0,0,0,.25);
}

/* Piece (gobbler) */
.piece{
--pColor:#999;
--pDeep:#666;
--size: 74px; /* default for large */
width: var(--size);
height: var(--size);
border-radius: 999px;
position: relative;
display:grid;
place-items:center;
box-shadow: 0 14px 30px rgba(0,0,0,.18);
border: 2px solid rgba(0,0,0,.22);
background:
radial-gradient(circle at 30% 25%, rgba(255,255,255,.8), transparent 42%),
radial-gradient(circle at 70% 65%, rgba(0,0,0,.12), transparent 55%),
linear-gradient(160deg, var(--pColor), var(--pDeep));
transform-origin: 50% 70%;
animation: pop .15s ease-out;
}

@keyframes pop{
from{ transform: scale(.86) rotate(-2deg); filter: saturate(1.2); }
to{ transform: scale(1) rotate(0deg); filter: saturate(1); }
}

/* sizes */
.piece.s1{ --size: 46px; }
.piece.s2{ --size: 60px; }
.piece.s3{ --size: 74px; }

.piece.blue{ --pColor: var(--blue); --pDeep: var(--blueDeep); }
.piece.orange{ --pColor: var(--orange); --pDeep: var(--orangeDeep); }

/* face */
.piece .eyes{
position:absolute;
top: 24%;
width: 72%;
display:flex;
justify-content:space-between;
padding: 0 10%;
pointer-events:none;
}
.piece .eye{
width: 16%;
aspect-ratio: 1 / 1;
background: #fff;
border-radius: 50%;
border: 2px solid rgba(0,0,0,.25);
position:relative;
box-shadow: inset 0 -2px 0 rgba(0,0,0,.08);
}
.piece .eye:after{
content:"";
position:absolute;
width: 42%;
height: 42%;
background:#111;
border-radius:50%;
top: 34%;
left: 34%;
}

.piece .mouth{
position:absolute;
bottom: 22%;
width: 62%;
height: 28%;
border-radius: 0 0 999px 999px;
background: #111;
box-shadow: inset 0 4px 0 rgba(255,255,255,.08);
transform: rotate(1deg);
overflow:hidden;
pointer-events:none;
}
.piece .teeth{
position:absolute;
top: -2px;
left: 10%;
right: 10%;
height: 46%;
display:flex;
justify-content:space-between;
opacity:.95;
}
.piece .tooth{
width: 10%;
height: 100%;
background: #fff;
border-radius: 0 0 6px 6px;
box-shadow: 0 2px 0 rgba(0,0,0,.12);
}

.piece.selected{
outline: 4px solid rgba(255,215,0,.9);
outline-offset: 2px;
box-shadow: 0 0 0 6px rgba(255,215,0,.25), 0 16px 34px rgba(0,0,0,.22);
animation: wiggle .55s ease-in-out infinite;
}

@keyframes wiggle{
0%,100% { transform: rotate(-2deg); }
50% { transform: rotate(2deg); }
}

/* Side panel */
.side{
display:grid;
gap:1
